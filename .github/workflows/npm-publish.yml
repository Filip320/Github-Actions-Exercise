name: Mojot Workflow

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  # 1. Главното облаче од кое тргнува сè
  build-and-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - name: Kloniraj go kodot
        uses: actions/checkout@v4
      - name: Izvrsi build
        run: echo "Pocetniot build e uspesen!"

  # 2. Прва гранка: summary (зависи САМО од build & test)
  summary:
    name: summary
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Generiraj izvestaj
        run: echo "Generiranje na summary izvestaj..."

  # 3. Втора гранка: matrix compatibility (ТОЧНО 1 job што ги тестира сите 3 верзии)
  matrix-compatibility:
    name: matrix compatibility
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Kloniraj go kodot
        uses: actions/checkout@v4

      - name: Testiraj gi site Node.js verzii (18, 20, 22)
        run: |
          for version in 18 20 22; do
            echo "--- Testiranje na Node.js v$version ---"
            nvm install $version
            node --version
          done
