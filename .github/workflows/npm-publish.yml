name: Mojot Workflow

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  # 1. Главното облаче од кое тргнува сè
  build-and-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - name: Kloniraj go kodot
        uses: actions/checkout@v4
      - name: Izvrsi build
        run: echo "Pocetniot build e uspesen!"

  # 2. Прва гранка: summary (поврзана со линија од build & test)
  summary:
    name: summary
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Generiraj izvestaj
        if: always() # Чекорот се извршува за да се креира summary извештај
        run: echo "Generiranje na summary izvestaj..."

  # 3. Втора гранка: matrix compatibility (поврзана со посебна линија од build & test)
  matrix-compatibility:
    name: matrix compatibility
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Kloniraj go kodot
        uses: actions/checkout@v4

      - name: Postavi Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Proveri verzija
        if: success() # Чекор со conditional 'if' внатре во steps
        run: node --version
