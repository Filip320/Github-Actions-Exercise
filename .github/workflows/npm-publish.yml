name: Mojot Napreden DevOps Workflow

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node-version: [18, 20, 22]
        os: [ubuntu-latest, windows-latest] # Сега имаме 6 комбинации!

    steps:
      - name: Kloniraj go kodot
        uses: actions/checkout@v4

      - name: Postavi Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Testiraj
        run: node --version
